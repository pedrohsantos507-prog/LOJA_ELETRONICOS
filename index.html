<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loja de eletronicos</title>

    <link rel="stylesheet" href="CSS/style.css">

    <script src="JS/script.js" defer></script>

</head>
<body>
    <form id="form-produtos">
        <h1>Loja de eletronicos</h1>
        <div class="form-group">
        <label for="produto">Produto:</label>
        <input type="text" id="produto" required placeholder="Ex: Notebook">
        </div>
        
        <div class="form-group">
        <label for="quantidade">Quantidade:</label>
        <input type="number" id="quantidade" required min="0" placeholder="Ex: 10">
        </div>
        
        <div class="form-group">
        <label for="valor">Valor do produto (R$):</label>
        <input type="number" id="valor" required min="0" step="0.01" placeholder="Ex: 2500">
        </div>
        <br>
        <button type="submit">
        Adicionar produto
        </button>
        
        </form>
        
        
        <h2>Produtos cadastrados</h2>
        
        <table>
        <thead>
        <tr>
        <th>Produto</th>
        <th>Quantidade</th>
        <th>Valor</th>
        </tr>
        </thead>
        
        <tbody id="lista-produtos">
        
        </tbody>
        </table>
</body>
</html>
