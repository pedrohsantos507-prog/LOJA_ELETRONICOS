<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loja de eletronicos</title>

    <link rel="stylesheet" href="CSS/style.css">

    <script src="JS/script.js" defer></script>

</head>
<body>
    <div class="container">
        <h1>Cálculo de Seguro e IPVA Automotivo</h1>
        
        <form id="form-veiculo">
            <div class="form-group">
                <label for="produto">produto:</label>
                <input type="text" id="produto" required placeholder="Ex: e.g. geladeira">
            </div>


            <div class="form-group">
                <label for="quantidade">quantidade:</label>
                <input type="number" id="quantidade" required min="0" max="20" placeholder="Ex: 20">
            </div>

            <div class="form-group">
                <label for="valor">Valor do eletrico: (R$):</label>
                <input type="number" id="valor" required min="0" step="0.01" placeholder="Ex: 50000">
            </div>

            <div class="form-group">
                <label>Tipo de produto:</label>
                <div class="radio-group">
                    <label><input type="radio" name="combustivel" value="gasolina" checked> Gasolina</label>
                    <label><input type="radio" name="combustivel" value="etanol"> Etanol</label>
                    <label><input type="radio" name="combustivel" value="bi"> Bicombustível</label>
                    <label><input type="radio" name="combustivel" value="hibrido"> Híbrido</label>
                    <label><input type="radio" name="combustivel" value="eletrico"> Elétrico</label>
                </div>
            </div>

            <button type="submit" id="btn-adicionar">Adicionar Veículo</button>
        </form>

        <h2>Veículos Cadastrados</h2>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Placa</th>
                        <th>Marca / Modelo</th>
                        <th>Idade</th>
                        <th>Seguro (10%)</th>
                        <th>IPVA</th>
                        <th>Valor Final</th>
                    </tr>
                </thead>
                <tbody id="lista-veiculos">
                    </tbody>
            </table>
        </div>
    </div>
</body>
</html>
