<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loja de eletronicos</title>

    <link rel="stylesheet" href="CSS/style.css">

    <script src="JS/script.js" defer></script>

</head>
<body>
    <div class="container">
        <h1>Loja de eletronicos</h1>
        
        <form id="form-produtos">
            <div class="form-group">
                <label for="produto">produto:</label>
                <input type="text" id="produto" required placeholder="Ex: Geladeira">
            </div>


            <div class="form-group">
                <label for="quantidade">quantidade:</label>
                <input type="number" id="quantidade" required min="0" max="20" placeholder="Ex: 20">
            </div>

            <div class="form-group">
                <label for="valor">Valor do eletronico: (R$):</label>
                <input type="number" id="valor" required min="0" step="0.01" placeholder="Ex: 5000">
            </div>

            <button type="submit" id="btn-adicionar">Adicionar produto</button>
        </form>

        <h2>produtos cadastrados</h2>
        <div class="table-container">
            <table>
                
                <tbody id="lista-produtos">
                    </tbody>
            </table>
        </div>
    </div>
</body>
</html>
